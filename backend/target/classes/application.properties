server.port=8080

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/hospital_db
spring.data.mongodb.database=hospital_db

# JWT
app.jwt.secret=YourSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm1234
app.jwt.expiration=86400000

# Mail (configure your SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App
app.name=Hospital Management System
app.frontend.url=http://localhost:3000

# CORS
app.cors.allowed-origins=http://localhost:3000

logging.level.com.hospital=DEBUG
